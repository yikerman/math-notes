name: Build PDFs

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: texlive/texlive:latest-full
    steps:
      - uses: actions/checkout@v6

      - name: Build all courses
        run: ./build.sh

      - name: Collect PDFs
        run: |
          mkdir -p pdf-output
          find . -path './*/main.pdf' -exec sh -c '
            dir=$(dirname "{}" | sed "s|^\./||")
            cp "{}" "pdf-output/${dir}.pdf"
          ' \;

      - name: Publish PDFs to rolling release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          files: pdf-output/*.pdf
          tag_name: latest
          name: Latest PDFs
          body: Automatically built from the latest commit on master.
          make_latest: "true"
          fail_on_unmatched_files: true
